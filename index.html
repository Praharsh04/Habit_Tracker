<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow — Planner Edition</title>
    <!-- CDN Imports -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
    <style>
        :root {
            /* Planner Palette */
            --bg-page: #0B2E33;
            --bg-card: #4F7C82;
            --primary: #93B1B5;
            --accent: #B8E3E9;
            --text-main: #ffffff;
            --text-muted: #B8E3E9;
            --border: #93B1B5;
            
            /* Accents per Week - adapted to new palette */
            --w1-bg: var(--bg-card);
            --w1-accent: var(--accent);
            --w2-bg: var(--bg-card);
            --w2-accent: var(--accent);
            --w3-bg: var(--bg-card);
            --w3-accent: var(--accent);
            --w4-bg: var(--bg-card);
            --w4-accent: var(--accent);
            --w5-bg: var(--bg-card);
            --w5-accent: var(--accent);
            
            --radius: 4px;
            --transition: 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: 'Instrument Sans', sans-serif;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
        }

        .mono {
            font-family: 'DM Mono', monospace;
            font-size: 0.85em;
        }

        /* Layout Grid */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 240px 1fr 320px;
            gap: 1.5rem;
        }

        /* Sidebar Left */
        .sidebar-left {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .month-header h1 {
            font-size: 4rem;
            line-height: 1;
        }

        .quote-card {
            background: var(--bg-card);
            padding: 2rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .quote-card h2 {
            font-size: 3rem;
            line-height: 0.9;
            color: var(--accent);
            margin-bottom: 2rem;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .top-stats-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
        }

        .area-chart-container {
            background: var(--bg-card);
            height: 150px;
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .circular-stats-group {
            display: flex;
            gap: 1rem;
        }

        .stat-circle-card {
            background: var(--bg-card);
            padding: 1rem;
            border: 1px solid var(--border);
            text-align: center;
            width: 140px;
        }

        /* Weekly Summary Row */
        .weekly-summary {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
        }

        .week-card {
            background: var(--bg-card);
            padding: 1rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .week-bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 60px;
            margin: 1rem 0;
        }

        .week-bar {
            flex: 1;
            background: var(--primary);
            border-radius: 2px 2px 0 0;
        }

        /* Main Log Grid */
        .log-grid-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        .log-grid {
            display: grid;
            grid-template-columns: 180px repeat(31, 30px);
            border-collapse: collapse;
        }

        .log-cell {
            border: 1px solid var(--border);
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .log-header {
            background: var(--bg-card);
            font-weight: 600;
        }

        .day-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }

        .checkbox.checked {
            background: var(--w1-accent);
            border-color: var(--w1-accent);
            position: relative;
        }

        .checkbox.checked::after {
            content: '✓';
            color: var(--bg-page);
            font-size: 12px;
            font-weight: 900;
        }

        /* Sidebar Right */
        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem;
        }

        .panel-title {
            text-align: center;
            padding: 0.5rem;
            background: var(--primary);
            color: var(--bg-page);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .data-table th, .data-table td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .progress-mini-bar {
            height: 8px;
            background: var(--bg-page);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-mini-fill {
            height: 100%;
            background: var(--w1-accent);
        }

        /* Controls */
        .btn-add {
            border: 1px dashed var(--border);
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        .btn-add:hover {
            background: var(--primary);
            color: var(--bg-page);
        }

        /* Helpers for Week Colors */
        .bg-w1 { background-color: var(--w1-bg); }
        .bg-w2 { background-color: var(--w2-bg); }
        .bg-w3 { background-color: var(--w3-bg); }
        .bg-w4 { background-color: var(--w4-bg); }
        .bg-w5 { background-color: var(--w5-bg); }
        
        .accent-w1 { color: var(--w1-accent); border-color: var(--w1-accent); }
        .accent-w2 { color: var(--w2-accent); border-color: var(--w2-accent); }
        .accent-w3 { color: var(--w3-accent); border-color: var(--w3-accent); }
        .accent-w4 { color: var(--w4-accent); border-color: var(--w4-accent); }
        .accent-w5 { color: var(--w5-accent); border-color: var(--w5-accent); }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const App = () => {
            const [habits, setHabits] = useState(() => JSON.parse(localStorage.getItem('hf_habits')) || [
                { id: '1', name: 'Read 1 Hour', goal: 80 },
                { id: '2', name: 'Stop Doomscrolling', goal: 80 },
                { id: '3', name: 'Workout', goal: 80 },
                { id: '4', name: 'Eat Clean', goal: 80 },
                { id: '5', name: 'Go Out in Nature', goal: 80 },
                { id: '6', name: 'Wake Up Early', goal: 80 },
                { id: '7', name: 'Drink 3L Water', goal: 80 },
                { id: '8', name: 'Learn Spanish', goal: 80 }
            ]);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('hf_logs')) || {});
            const [activeDate, setActiveDate] = useState(new Date(2026, 0, 1)); // January 2026

            useEffect(() => {
                localStorage.setItem('hf_habits', JSON.stringify(habits));
                localStorage.setItem('hf_logs', JSON.stringify(logs));
            }, [habits, logs]);

            const daysInMonth = new Date(activeDate.getFullYear(), activeDate.getMonth() + 1, 0).getDate();
            const monthName = activeDate.toLocaleString('default', { month: 'long' });
            
            const getDayOfWeek = (day) => {
                const date = new Date(activeDate.getFullYear(), activeDate.getMonth(), day);
                return date.toLocaleString('default', { weekday: 'narrow' });
            };

            const getWeekNum = (day) => {
                const date = new Date(activeDate.getFullYear(), activeDate.getMonth(), day);
                const startOfMonth = new Date(activeDate.getFullYear(), activeDate.getMonth(), 1);
                const dayOffset = startOfMonth.getDay(); 
                return Math.floor((day + dayOffset - 1) / 7) + 1;
            };

            const toggleLog = (habitId, day) => {
                const dateKey = `${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${day}`;
                const newLogs = { ...logs };
                if (!newLogs[dateKey]) newLogs[dateKey] = {};
                newLogs[dateKey][habitId] = !newLogs[dateKey][habitId];
                setLogs(newLogs);
            };

            // Analytics Calculations
            const stats = useMemo(() => {
                const dayStats = Array.from({ length: daysInMonth }, (_, i) => {
                    const day = i + 1;
                    const dateKey = `${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${day}`;
                    const completed = Object.values(logs[dateKey] || {}).filter(Boolean).length;
                    return (completed / (habits.length || 1)) * 100;
                });

                const weekStats = [1, 2, 3, 4, 5].map(w => {
                    let done = 0;
                    let total = 0;
                    for (let d = 1; d <= daysInMonth; d++) {
                        if (getWeekNum(d) === w) {
                            const dateKey = `${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${d}`;
                            done += Object.values(logs[dateKey] || {}).filter(Boolean).length;
                            total += habits.length;
                        }
                    }
                    const pct = total > 0 ? (done / total) * 100 : 0;
                    // Mock day bars for the week
                    const bars = Array.from({length: 7}, (_, i) => {
                        return Math.random() * 80 + 20; // Visual placeholder
                    });
                    return { pct: pct.toFixed(1), bars };
                });

                const habitProgress = habits.map(h => {
                    let done = 0;
                    let streak = 0;
                    let maxStreak = 0;
                    for(let d=1; d<=daysInMonth; d++) {
                        const dateKey = `${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${d}`;
                        if(logs[dateKey]?.[h.id]) {
                            done++;
                            streak++;
                            if(streak > maxStreak) maxStreak = streak;
                        } else {
                            streak = 0;
                        }
                    }
                    return { ...h, done, pct: Math.round((done/daysInMonth)*100), maxStreak };
                });

                const totalCompleted = habitProgress.reduce((acc, curr) => acc + curr.done, 0);
                const totalPossible = habits.length * daysInMonth;

                return { dayStats, weekStats, habitProgress, totalCompleted, totalPossible };
            }, [habits, logs, daysInMonth, activeDate]);

            const Donut = ({ percent, size = 80, color = "var(--accent)", label }) => {
                const stroke = 6;
                const radius = (size - stroke) / 2;
                const circum = radius * 2 * Math.PI;
                const offset = circum - (percent / 100) * circum;
                
                return (
                    <div style={{ position: 'relative', width: size, height: size, margin: '0 auto' }}>
                        <svg width={size} height={size}>
                            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="var(--border)" strokeWidth={stroke} />
                            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={stroke} 
                                    strokeDasharray={circum} strokeDashoffset={offset} strokeLinecap="round"
                                    transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition: 'stroke-dashoffset 0.5s ease' }} />
                        </svg>
                        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                            <div style={{ fontSize: size * 0.2, fontWeight: 700 }}>{percent}%</div>
                            {label && <div className="mono" style={{ fontSize: '8px', opacity: 0.5 }}>{label}</div>}
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-container">
                    {/* LEFT SIDEBAR */}
                    <div className="sidebar-left">
                        <div className="month-header">
                            <h1>{monthName}</h1>
                            <div className="mono" style={{letterSpacing: '0.2em', marginTop: '0.5rem', fontWeight: 600}}>HABIT TRACKER</div>
                        </div>

                        <div className="panel-card" style={{padding: '0', border: 'none', borderRadius: 0}}>
                            <div style={{display: 'flex', gap: '2px'}}>
                                <div className="bg-w1" style={{flex: 1, padding: '0.5rem', textAlign: 'center'}}>
                                    <div className="mono" style={{fontSize: '0.6rem'}}>MONTH</div>
                                    <div style={{fontSize: '0.8rem', fontWeight: 600}}>{monthName}</div>
                                </div>
                                <div className="bg-w4" style={{flex: 1, padding: '0.5rem', textAlign: 'center'}}>
                                    <div className="mono" style={{fontSize: '0.6rem'}}>YEAR</div>
                                    <div style={{fontSize: '0.8rem', fontWeight: 600}}>{activeDate.getFullYear()}</div>
                                </div>
                            </div>
                        </div>

                        <div className="quote-card">
                            <h2 style={{ letterSpacing: '-0.05em' }}>trust<br/>the<br/>process</h2>
                            <div style={{marginTop: '2rem', textAlign: 'left', fontStyle: 'italic', fontSize: '0.9rem'}}>
                                <div className="mono" style={{fontSize: '0.7rem', color: 'var(--text-muted)', marginBottom: '0.5rem'}}>I am ...</div>
                                <div style={{ borderBottom: '1px solid var(--border)', paddingBottom: '4px' }}>Focused, intentional, and ready for the month ahead.</div>
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="main-content">
                        <div className="top-stats-row">
                            <div className="area-chart-container">
                                <svg viewBox="0 0 100 20" preserveAspectRatio="none" style={{width: '100%', height: '100%'}}>
                                    <path 
                                        d={`M 0 20 ${stats.dayStats.map((val, i) => `L ${(i / (daysInMonth - 1)) * 100} ${18 - (val / 7)}`).join(' ')} L 100 20 Z`}
                                        fill="var(--accent)" fillOpacity="0.2"
                                    />
                                    <path 
                                        d={`M 0 20 ${stats.dayStats.map((val, i) => `L ${(i / (daysInMonth - 1)) * 100} ${18 - (val / 7)}`).join(' ')}`}
                                        fill="none" stroke="var(--accent)" strokeWidth="0.3"
                                    />
                                </svg>
                            </div>
                            <div className="circular-stats-group">
                                <div className="stat-circle-card bg-w2" style={{ width: '160px', border: 'none' }}>
                                    <div className="mono" style={{fontSize: '0.7rem', marginBottom: '0.5rem'}}>DAILY PROGRESS</div>
                                    <div style={{ fontSize: '2rem', fontWeight: 400 }}>{Math.round((stats.totalCompleted/stats.totalPossible)*10000)/100}%</div>
                                </div>
                                <div className="stat-circle-card bg-w2" style={{ width: '160px', border: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                                    <div className="mono" style={{fontSize: '0.7rem'}}>HABITS</div>
                                    <Donut percent={Math.round((stats.totalCompleted/stats.totalPossible)*100)} size={70} color="var(--accent)" />
                                    <div className="mono" style={{ fontSize: '0.7rem', marginTop: '4px' }}>{stats.totalCompleted} / {stats.totalPossible}</div>
                                </div>
                            </div>
                        </div>

                        <div className="weekly-summary">
                            {[1, 2, 3, 4, 5].map((w, idx) => (
                                <div key={w} className={`week-card`}>
                                    <div className="mono" style={{fontSize: '0.7rem', opacity: 0.6}}>week {w}</div>
                                    <div className="week-bar-chart">
                                        {stats.weekStats[idx].bars.map((h, i) => (
                                            <div key={i} className="week-bar" style={{height: `${h}%`, background: `var(--w${w}-accent)`}}></div>
                                        ))}
                                    </div>
                                    <Donut percent={Math.round(stats.weekStats[idx].pct)} size={60} color={`var(--w${w}-accent)`} />
                                </div>
                            ))}
                        </div>

                        <div className="log-grid-container">
                            <div className="log-grid" style={{background: 'var(--primary)', padding: '0.5rem 0', color: 'var(--bg-page)'}}>
                                <div className="log-cell" style={{justifyContent: 'flex-start', paddingLeft: '1rem', fontWeight: 700, borderColor: 'var(--bg-page)'}}>DAILY HABITS</div>
                                {Array.from({length: daysInMonth}, (_, i) => (
                                    <div key={i} className="day-header mono" style={{borderColor: 'var(--bg-page)'}}>
                                        <div style={{fontSize: '0.6rem'}}>{getDayOfWeek(i+1)}</div>
                                        <div style={{fontSize: '0.8rem'}}>{i+1}</div>
                                    </div>
                                ))}
                            </div>
                            {habits.map((h, hIdx) => (
                                <div key={h.id} className="log-grid">
                                    <div className="log-cell" style={{justifyContent: 'flex-start', paddingLeft: '1rem', borderRight: '2px solid var(--border)'}}>
                                        <span style={{fontSize: '0.7rem', marginRight: '0.5rem', opacity: 0.4}}>{hIdx + 1}</span>
                                        <span style={{fontSize: '0.8rem'}}>{h.name}</span>
                                    </div>
                                    {Array.from({length: daysInMonth}, (_, i) => {
                                        const day = i + 1;
                                        const weekNum = getWeekNum(day);
                                        const isChecked = logs[`${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${day}`]?.[h.id];
                                        return (
                                            <div key={i} className={`log-cell bg-w${weekNum}`}>
                                                <div 
                                                    className={`checkbox ${isChecked ? 'checked' : ''} accent-w${weekNum}`}
                                                    onClick={() => toggleLog(h.id, day)}
                                                />
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                            <div className="btn-add mono" onClick={() => {
                                const name = prompt("Habit Name?");
                                if(name) setHabits([...habits, { id: Date.now().toString(), name, goal: 80 }]);
                            }}>+ ADD NEW HABIT</div>
                        </div>
                    </div>

                    {/* RIGHT SIDEBAR */}
                    <div className="sidebar-right">
                        <div className="panel-card">
                            <div className="panel-title">TOP 10 HABITS</div>
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>daily habit</th>
                                        <th style={{textAlign: 'right'}}>progress</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {stats.habitProgress.sort((a,b) => b.pct - a.pct).slice(0, 10).map((h, i) => (
                                        <tr key={h.id}>
                                            <td>{i+1}</td>
                                            <td>{h.name}</td>
                                            <td style={{textAlign: 'right'}}>{h.pct}%</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div className="panel-card">
                            <div className="panel-title">DAILY PROGRESS</div>
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>goal</th>
                                        <th>percentage</th>
                                        <th>count</th>
                                        <th>streak</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {stats.habitProgress.map(h => (
                                        <tr key={h.id}>
                                            <td>{h.goal}%</td>
                                            <td>
                                                <div className="progress-mini-bar">
                                                    <div className="progress-mini-fill" style={{width: `${h.pct}%`}}></div>
                                                </div>
                                            </td>
                                            <td>{h.done}/{daysInMonth}</td>
                                            <td>{h.maxStreak}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
