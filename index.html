<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow — Premium Planner</title>
    <!-- CDN Imports -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet"/>
    <style>
        :root {
            /* Cohesive Minimal Palette */
            --bg-page: #30364F;
            --surface: #ACBAC4;
            --primary: #E1D9BC;
            --accent: #F0F0DB;
            
            --text-main: #F0F0DB;
            --text-muted: #30364F; /* Dark text on light surface */
            --border: rgba(48, 54, 79, 0.15);
            
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            
            --radius-lg: 16px;
            --radius-md: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: 'Instrument Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
        }

        .mono {
            font-family: 'DM Mono', monospace;
            font-size: 0.85em;
        }

        /* Layout Grid */
        .app-container {
            width: 100%;
            max-width: 1550px;
            display: grid;
            grid-template-columns: 280px 1fr 340px;
            gap: 2rem;
            align-items: start;
        }

        /* Sidebar Panels */
        .sidebar-left, .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .month-header h1 {
            font-size: 5rem;
            line-height: 0.8;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .premium-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            color: var(--bg-page); /* Dark text for cards */
        }

        .premium-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .quote-card {
            background: var(--surface);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .quote-card h2 {
            font-size: 3.5rem;
            line-height: 0.9;
            color: var(--bg-page);
            margin-bottom: 2rem;
            letter-spacing: -0.05em;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .top-stats-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
        }

        .area-chart-container {
            background: var(--surface);
            height: 180px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .stat-circle-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
            width: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: var(--bg-page);
        }

        /* Weekly Summary Row */
        .weekly-summary {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
        }

        .week-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            padding: 1.25rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: var(--bg-page);
        }

        .week-bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 40px;
            width: 100%;
        }

        .week-bar {
            flex: 1;
            background: var(--primary);
            opacity: 0.6;
            border-radius: 2px 2px 0 0;
            transition: var(--transition);
        }

        .week-card:hover .week-bar {
            opacity: 1;
            background: var(--bg-page);
        }

        /* Log Grid Container */
        .log-grid-container {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            color: var(--bg-page);
        }

        .log-scroll-area {
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .log-grid {
            display: grid;
            grid-template-columns: 220px repeat(31, 35px);
        }

        .log-cell {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .log-header-row {
            background: rgba(48, 54, 79, 0.05);
            font-weight: 600;
        }

        .habit-name-cell {
            justify-content: flex-start;
            padding: 0 1.25rem;
            font-weight: 500;
            background: var(--surface);
            position: sticky;
            left: 0;
            z-index: 10;
        }

        /* Checkbox Design */
        .check-wrapper {
            width: 22px;
            height: 22px;
            border: 2px solid var(--bg-page);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .check-wrapper.active {
            background: var(--accent);
            border-color: var(--bg-page);
            transform: scale(1.1);
        }

        .check-wrapper.active::after {
            content: "";
            width: 6px;
            height: 10px;
            border: solid var(--bg-page);
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        /* Sidebar Right Tables */
        .panel-title {
            padding: 0.75rem;
            background: var(--bg-page);
            color: var(--accent);
            border-radius: var(--radius-md);
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-align: center;
            text-transform: uppercase;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--bg-page);
            opacity: 0.6;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 0.75rem 0.5rem;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }

        .progress-track {
            height: 6px;
            background: rgba(48, 54, 79, 0.1);
            border-radius: 3px;
            overflow: hidden;
            width: 80px;
        }

        .progress-fill {
            height: 100%;
            background: var(--bg-page);
            border-radius: 3px;
        }

        .btn-add {
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            color: var(--bg-page);
            border: 1px dashed var(--bg-page);
            margin: 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-add:hover {
            background: var(--primary);
            border-color: var(--bg-page);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-page); opacity: 0.3; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--bg-page); }

        @media (max-width: 1400px) {
            .app-container {
                grid-template-columns: 240px 1fr;
            }
            .sidebar-right { display: none; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [habits, setHabits] = useState(() => JSON.parse(localStorage.getItem('hf_habits')) || [
                { id: '1', name: 'Deep Work Session', goal: 80 },
                { id: '2', name: 'Digital Detox', goal: 85 },
                { id: '3', name: 'Physical Training', goal: 75 },
                { id: '4', name: 'Clean Nutrition', goal: 90 },
                { id: '5', name: 'Nature Walk', goal: 60 },
                { id: '6', name: 'Sunrise Routine', goal: 80 },
                { id: '7', name: 'Hydration Goal', goal: 100 },
                { id: '8', name: 'Strategic Planning', goal: 70 }
            ]);
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('hf_logs')) || {});
            const [activeDate] = useState(new Date(2026, 0, 1));

            useEffect(() => {
                localStorage.setItem('hf_habits', JSON.stringify(habits));
                localStorage.setItem('hf_logs', JSON.stringify(logs));
            }, [habits, logs]);

            const daysInMonth = new Date(activeDate.getFullYear(), activeDate.getMonth() + 1, 0).getDate();
            const monthName = activeDate.toLocaleString('default', { month: 'long' });

            const stats = useMemo(() => {
                const dayStats = Array.from({ length: daysInMonth }, (_, i) => {
                    const dateKey = `${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${i + 1}`;
                    return (Object.values(logs[dateKey] || {}).filter(Boolean).length / (habits.length || 1)) * 100;
                });

                const habitProgress = habits.map(h => {
                    let done = 0, streak = 0, maxStreak = 0;
                    for(let d=1; d<=daysInMonth; d++) {
                        const key = `${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${d}`;
                        if(logs[key]?.[h.id]) { done++; streak++; maxStreak = Math.max(maxStreak, streak); }
                        else streak = 0;
                    }
                    return { ...h, done, pct: Math.round((done/daysInMonth)*100), maxStreak };
                });

                return { dayStats, habitProgress, 
                         total: habitProgress.reduce((a,b) => a + b.done, 0),
                         possible: habits.length * daysInMonth };
            }, [habits, logs, daysInMonth]);

            const toggle = (id, day) => {
                const key = `${activeDate.getFullYear()}-${activeDate.getMonth() + 1}-${day}`;
                const next = { ...logs };
                if (!next[key]) next[key] = {};
                next[key][id] = !next[key][id];
                setLogs(next);
            };

            const Donut = ({ pct, size = 60, color = "var(--bg-page)" }) => {
                const r = (size - 6) / 2, c = 2 * Math.PI * r;
                return (
                    <div style={{ position: 'relative', width: size, height: size }}>
                        <svg width={size} height={size}>
                            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(48, 54, 79, 0.1)" strokeWidth="4" />
                            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4" 
                                    strokeDasharray={c} strokeDashoffset={c - (pct/100)*c} strokeLinecap="round"
                                    transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition: 'all 0.6s ease' }} />
                        </svg>
                        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.75rem', fontWeight: 700 }}>{Math.round(pct)}%</div>
                    </div>
                );
            };

            return (
                <div className="app-container">
                    <aside className="sidebar-left">
                        <div className="month-header">
                            <div className="mono" style={{ color: 'var(--accent)', letterSpacing: '0.3em' }}>{activeDate.getFullYear()}</div>
                            <h1>{monthName}</h1>
                        </div>
                        <div className="premium-card quote-card">
                            <div className="mono" style={{ fontSize: '0.7rem', color: 'var(--bg-page)', marginBottom: '1rem', opacity: 0.6 }}>PHILOSOPHY</div>
                            <h2>TRUST<br/>THE<br/>PROCESS</h2>
                            <p style={{ fontStyle: 'italic', fontSize: '0.9rem', color: 'var(--bg-page)', opacity: 0.8 }}>"Consistency is the currency of excellence."</p>
                        </div>
                        <div className="premium-card">
                            <h3 style={{ fontSize: '1.2rem', marginBottom: '1rem' }}>Monthly Snapshot</h3>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <div>
                                    <div className="mono" style={{ fontSize: '0.65rem', opacity: 0.6 }}>SUCCESS RATE</div>
                                    <div style={{ fontSize: '1.5rem', fontWeight: 600 }}>{Math.round((stats.total/stats.possible)*100)}%</div>
                                </div>
                                <Donut pct={(stats.total/stats.possible)*100} size={50} />
                            </div>
                        </div>
                    </aside>

                    <main className="main-content">
                        <div className="top-stats-row">
                            <div className="area-chart-container">
                                <svg viewBox="0 0 100 20" preserveAspectRatio="none" style={{width: '100%', height: '100%'}}>
                                    <path d={`M 0 20 ${stats.dayStats.map((v, i) => `L ${(i/(daysInMonth-1))*100} ${18-(v/6)}`).join(' ')} L 100 20 Z`} fill="var(--bg-page)" fillOpacity="0.15" />
                                    <path d={`M 0 20 ${stats.dayStats.map((v, i) => `L ${(i/(daysInMonth-1))*100} ${18-(v/6)}`).join(' ')}`} fill="none" stroke="var(--bg-page)" strokeWidth="0.2" />
                                </svg>
                            </div>
                            <div className="stat-circle-card">
                                <div className="mono" style={{ fontSize: '0.65rem', color: 'var(--bg-page)', marginBottom: '0.5rem', opacity: 0.6 }}>COMPLETED</div>
                                <div style={{ fontSize: '2.5rem', fontWeight: 400 }}>{stats.total}</div>
                                <div className="mono" style={{ fontSize: '0.65rem', opacity: 0.5 }}>RITUALS</div>
                            </div>
                        </div>

                        <div className="weekly-summary">
                            {[1,2,3,4,5].map(w => (
                                <div key={w} className="week-card">
                                    <div className="mono" style={{ fontSize: '0.65rem', opacity: 0.5 }}>WEEK {w}</div>
                                    <div className="week-bar-chart">
                                        {Array.from({length:7}).map((_,i) => <div key={i} className="week-bar" style={{height:`${Math.random()*100}%`}} />)}
                                    </div>
                                    <Donut pct={70 + Math.random()*20} size={45} />
                                </div>
                            ))}
                        </div>

                        <div className="log-grid-container">
                            <div className="log-scroll-area">
                                <div className="log-grid log-header-row">
                                    <div className="log-cell habit-name-cell">RITUAL MATRIX</div>
                                    {Array.from({length: daysInMonth}, (_, i) => (
                                        <div key={i} className="log-cell day-header mono">
                                            {i+1}
                                        </div>
                                    ))}
                                </div>
                                {habits.map((h, hIdx) => (
                                    <div key={h.id} className="log-grid">
                                        <div className="log-cell habit-name-cell">
                                            <span style={{ fontSize: '0.7rem', color: 'var(--bg-page)', opacity: 0.4, marginRight: '0.75rem' }}>0{hIdx+1}</span>
                                            {h.name}
                                        </div>
                                        {Array.from({length: daysInMonth}, (_, i) => (
                                            <div key={i} className="log-cell">
                                                <div className={`check-wrapper ${logs[`${activeDate.getFullYear()}-${activeDate.getMonth()+1}-${i+1}`]?.[h.id] ? 'active' : ''}`}
                                                     onClick={() => toggle(h.id, i+1)} />
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                            <div className="btn-add mono" onClick={() => {
                                const n = prompt("Habit Name?");
                                if(n) setHabits([...habits, { id: Date.now().toString(), name: n, goal: 80 }]);
                            }}>+ INTEGRATE NEW RITUAL</div>
                        </div>
                    </main>

                    <aside className="sidebar-right">
                        <div className="premium-card">
                            <div className="panel-title">Consistency Leaderboard</div>
                            <table className="data-table">
                                <thead>
                                    <tr><th>Habit</th><th style={{textAlign:'right'}}>Progress</th></tr>
                                </thead>
                                <tbody>
                                    {stats.habitProgress.sort((a,b)=>b.pct-a.pct).slice(0,5).map(h => (
                                        <tr key={h.id}>
                                            <td>{h.name}</td>
                                            <td style={{textAlign:'right'}}>
                                                <div style={{display:'flex', alignItems:'center', gap:'0.5rem', justifyContent:'flex-end'}}>
                                                    <div className="progress-track"><div className="progress-fill" style={{width:`${h.pct}%`}} /></div>
                                                    <span className="mono">{h.pct}%</span>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div className="premium-card">
                            <div className="panel-title">Streak Intel</div>
                            <table className="data-table">
                                <thead>
                                    <tr><th>Target</th><th>Streak</th><th style={{textAlign:'right'}}>Count</th></tr>
                                </thead>
                                <tbody>
                                    {stats.habitProgress.map(h => (
                                        <tr key={h.id}>
                                            <td className="mono" style={{fontSize:'0.7rem'}}>{h.goal}%</td>
                                            <td><span style={{color:'var(--bg-page)', fontWeight:700}}>{h.maxStreak}d</span></td>
                                            <td style={{textAlign:'right'}}>{h.done}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </aside>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
